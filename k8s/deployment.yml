apiVersion: apps/v1
kind: Deployment
metadata:
  name: kronfort
  labels:
    app: kronfort
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kronfort
  template:
    metadata:
      labels:
        app: kronfort
    spec:
      containers:
        - name: kronfort
          image: kronfort-frontend:latest  # Will be updated dynamically in CI/CD
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      imagePullSecrets:
        - name: dockerhub-secret