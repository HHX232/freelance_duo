apiVersion: apps/v1
kind: Deployment
metadata:
  name: kronfort
  labels:
    app: kronfort
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kronfort
  template:
    metadata:
      labels:
        app: kronfort
    spec:
      containers:
        - name: kronfort
          image: my-registry.com/my-app:latest  # Will be updated dynamically in CI/CD
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
