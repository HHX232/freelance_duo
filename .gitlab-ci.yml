  stage: notify
  script:
    - |
      curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
      -d "chat_id=$TELEGRAM_CHAT_ID" \
      -d "text=âś… *GitLab CI/CD Pipeline SUCCESS* đźŽ‰%0Ađźš€ Repo: *$CI_PROJECT_NAME*%0Ađź”€ Merge Request: [!$CI_MERGE_REQUEST_ID]($CI_PROJECT_URL/-/merge_requests/$CI_MERGE_REQUEST_ID)%0Ađź’š Status: *Pipeline Succeeded*%0Ađź”— [View Pipeline]($CI_PIPELINE_URL)" \
      -d "parse_mode=Markdown"
  when: on_success  # Runs only if the pipeline is successful
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
