stages:
  - build
  - deploy

variables:
  IMAGE_NAME: "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"

before_script:
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

build:
  stage: build
  script:
    - docker build -t "$IMAGE_NAME" .
    - docker push "$IMAGE_NAME"

deploy:
  stage: deploy
  script:
    - kubectl config set-cluster minikube --server=https://minikube:8443
    - kubectl config set-credentials admin --token=$KUBE_TOKEN
    - kubectl config set-context minikube --cluster=minikube --user=admin
    - kubectl config use-context minikube
    # Replace the image in deployment.yml dynamically
    - sed -i "s|my-registry.com/my-app:latest|$IMAGE_NAME|g" k8s/deployment.yml
    # Apply Kubernetes manifests
    - kubectl apply -f k8s/deployment.yml
    - kubectl apply -f k8s/service.yml
