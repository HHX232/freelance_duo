stages:
  - build
  - deploy
  - notify

variables:
  IMAGE_NAME: "yernazarq747/kronfort-frontend:latest"

build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_PASSWORD"
  script:
    - docker build -t "$IMAGE_NAME" .
    - docker push "$IMAGE_NAME"
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'  # Runs on main branch
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'  

deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  before_script:
    - export KUBECONFIG=/home/test-perimeter/.kube/config
    - kubectl config set-cluster minikube --server=https://$(minikube ip):8443 --insecure-skip-tls-verify=true
    - kubectl cluster-info
  script:
    - kubectl apply -f k8s/deployment.yml
    - kubectl apply -f k8s/service.yml
    - kubectl rollout restart deployment kronfort
  when: on_success
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

telegram_alert_failure:
  stage: notify
  script:
    - |
      curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
      -d "chat_id=$TELEGRAM_CHAT_ID" \
      -d "text=đźš¨ *GitLab CI/CD Job FAILED* đźš¨%0Ađź›‘ Repo: *$CI_PROJECT_NAME*%0Ađź“› Job: *$CI_JOB_NAME*%0Ađź“Ś Status: *$CI_JOB_STATUS*%0Ađź”— [View Job]($CI_JOB_URL)" \
      -d "parse_mode=Markdown"
  when: on_failure  # Runs only if a job fails
  only:
    - main

telegram_alert_success:
  stage: notify
  script:
    - |
      curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
      -d "chat_id=$TELEGRAM_CHAT_ID" \
      -d "text=âś… *GitLab CI/CD Pipeline SUCCESS* đźŽ‰%0Ađźš€ Repo: *$CI_PROJECT_NAME*%0Ađź’š Status: *Pipeline Succeeded*%0Ađź”— [View Pipeline]($CI_PIPELINE_URL)" \
      -d "parse_mode=Markdown"
  when: on_success  # Runs only if the pipeline is successful
  only:
    - main

telegram_alert_failure_slave:
  stage: notify
  script:
    - |
      echo "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage"
      curl -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
      -d "chat_id=$TELEGRAM_CHAT_ID" \
      -d "text=đźš¨ *GitLab CI/CD Job FAILED* đźš¨%0Ađź›‘ Repo: *$CI_PROJECT_NAME*%0Ađź”€ Merge Request: [!$CI_MERGE_REQUEST_ID]($CI_PROJECT_URL/-/merge_requests/$CI_MERGE_REQUEST_ID)%0Ađź“Ś Status: *$CI_JOB_STATUS*%0Ađź”— [View Job]($CI_JOB_URL)" \
      -d "parse_mode=Markdown"
  when: on_failure  # Runs only if a job fails
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

